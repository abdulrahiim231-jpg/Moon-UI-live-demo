<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        #quote {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            max-width: 800px;
        }
        #input {
            font-size: 20px;
            padding: 15px;
            width: 600px;
            max-width: 90vw;
            border: none;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        #stats {
            display: flex;
            gap: 30px;
            font-size: 18px;
        }
        .correct { background: rgba(0,255,0,0.2); }
        .incorrect { background: rgba(255,0,0,0.2); }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            margin-top: 20px;
        }
        button:hover { background: #45a049; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Typing Speed Test</h1>
    <div id="quote"></div>
    <input type="text" id="input" placeholder="Start typing the quote above..." disabled>
    <div id="stats">
        <span>WPM: <span id="wpm">0</span></span>
        <span>Accuracy: <span id="accuracy">0%</span></span>
        <span>Time: <span id="time">0</span>s</span>
    </div>
    <button id="startBtn">Start Test</button>

    <script>
        const quotes = [
            "The quick brown fox jumps over the lazy dog.",
            "Practice makes perfect in typing speed tests.",
            "JavaScript and HTML create interactive web apps.",
            "CSS styles make interfaces beautiful and responsive.",
            "Keep typing to improve your words per minute score."
        ];

        const quoteEl = document.getElementById('quote');
        const inputEl = document.getElementById('input');
        const wpmEl = document.getElementById('wpm');
        const accuracyEl = document.getElementById('accuracy');
        const timeEl = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');

        let currentQuote = '';
        let startTime;
        let timer;

        function newQuote() {
            currentQuote = quotes[Math.floor(Math.random() * quotes.length)];
            quoteEl.textContent = currentQuote;
            inputEl.value = '';
            inputEl.disabled = false;
            inputEl.focus();
            startBtn.disabled = true;
            startTime = null;
            updateStats();
        }

        function updateStats() {
            const typed = inputEl.value;
            const timeElapsed = startTime ? (Date.now() - startTime) / 1000 / 60 : 0; // minutes
            let correctChars = 0;
            let totalChars = typed.length;

            for (let i = 0; i < Math.min(typed.length, currentQuote.length); i++) {
                if (typed[i] === currentQuote[i]) correctChars++;
            }

            const wpm = totalChars > 0 ? Math.round((correctChars / 5) / timeElapsed) : 0;
            const accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 0;

            wpmEl.textContent = isNaN(wpm) ? 0 : wpm;
            accuracyEl.textContent = accuracy + '%';
            timeEl.textContent = Math.round((Date.now() - (startTime || Date.now())) / 1000);
        }

        inputEl.addEventListener('input', () => {
            if (!startTime) startTime = Date.now();
            updateStats();

            if (inputEl.value === currentQuote) {
                inputEl.disabled = true;
                startBtn.disabled = false;
                clearInterval(timer);
            }
        });

        startBtn.addEventListener('click', newQuote);

        // Auto-start on load
        newQuote();
    </script>
</body>
</html>
