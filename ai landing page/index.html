<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Chatbox - Premium Glassmorphism</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        .space-grotesk { font-family: 'Space Grotesk', sans-serif; }
        body { 
            background: #0a0a0a; 
            overflow-x: hidden;
            background-attachment: fixed;
        }
        
        /* Enhanced Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .glass-dark {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.05),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* Enhanced Background */
        .hero-bg {
            background: 
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: hero-glow 20s ease-in-out infinite;
        }
        
        @keyframes hero-glow {
            0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.5; }
            50% { transform: rotate(180deg) scale(1.1); opacity: 0.8; }
        }
        
        /* Enhanced Gradients */
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #9333ea 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #3b82f6 0%, #9333ea 100%);
        }
        
        .neon-border {
            box-shadow: 
                0 0 20px rgba(59, 130, 246, 0.5),
                0 0 40px rgba(147, 51, 234, 0.3),
                0 0 60px rgba(236, 72, 153, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
        }
        
        .neon-border-hover:hover {
            box-shadow: 
                0 0 30px rgba(59, 130, 246, 0.8),
                0 0 50px rgba(147, 51, 234, 0.5),
                0 0 70px rgba(236, 72, 153, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        /* Message Animations */
        .message-bubble {
            animation: messageSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 70%;
        }
        
        @keyframes messageSlide {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            background: rgba(147, 51, 234, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(147, 51, 234, 0.3);
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9333ea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        /* Floating Elements */
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .floating-element {
            position: absolute;
            background: linear-gradient(45deg, #3b82f6, #9333ea, #ec4899);
            border-radius: 50%;
            opacity: 0.6;
            animation: float-around 25s infinite linear;
        }
        
        @keyframes float-around {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, -100px) rotate(90deg); }
            50% { transform: translate(-50px, -200px) rotate(180deg); }
            75% { transform: translate(-150px, -100px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        
        /* Enhanced Buttons */
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        /* Scrollbar Styling */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(147, 51, 234, 0.5);
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(147, 51, 234, 0.7);
        }
        
        /* Responsive Design */
        @media (max-width: 1024px) {
            .container { padding: 0 1rem; }
            .glass-card { margin: 0.5rem; }
            .message-bubble { max-width: 75%; }
        }
        
        @media (max-width: 768px) {
            body { font-size: 14px; }
            
            /* Navigation */
            nav { padding: 1rem; }
            .nav-content { flex-direction: column; gap: 1rem; }
            .api-input-container { 
                flex-direction: column; 
                width: 100%;
                max-width: 300px;
            }
            .api-input-container input { width: 100%; }
            
            /* Header */
            .glass-card { margin: 1rem 0.5rem; padding: 1.5rem; }
            .glass-card h1 { font-size: 2rem !important; }
            .glass-card p { font-size: 1rem !important; }
            .status-container { 
                flex-direction: column; 
                gap: 1rem; 
                text-align: center;
            }
            
            /* Chat Container */
            .chat-container { 
                max-height: 60vh; 
                margin: 0.5rem;
                padding: 1rem;
            }
            .message-bubble { 
                max-width: 85%; 
                font-size: 0.9rem;
            }
            .message-bubble p { font-size: 0.85rem; }
            .message-bubble .timestamp { font-size: 0.7rem; }
            
            /* Quick Actions */
            .quick-actions { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 0.5rem;
                margin-bottom: 1rem;
            }
            .quick-actions button { 
                padding: 0.75rem; 
                font-size: 0.8rem;
            }
            .quick-actions i { font-size: 1rem; }
            
            /* Input Section */
            .input-container { 
                flex-direction: column; 
                gap: 1rem;
                padding: 0 0.5rem;
            }
            .message-input { 
                font-size: 1rem; 
                padding: 1rem;
            }
            .send-button { 
                width: 100%; 
                padding: 1rem;
                font-size: 1rem;
            }
            
            /* Floating Elements */
            .floating-element { display: none; }
        }
        
        @media (max-width: 480px) {
            /* Extra Small Mobile */
            body { font-size: 13px; }
            
            nav { padding: 0.75rem 1rem; }
            .logo-container { 
                flex-direction: column; 
                text-align: center;
                gap: 0.5rem;
            }
            .logo-container .logo-title { font-size: 1.25rem !important; }
            .logo-container .logo-subtitle { font-size: 0.75rem; }
            
            .glass-card { 
                margin: 0.5rem; 
                padding: 1rem;
                border-radius: 1.5rem;
            }
            .glass-card h1 { font-size: 1.75rem !important; }
            .glass-card p { font-size: 0.9rem !important; }
            
            .chat-container { 
                max-height: 55vh; 
                padding: 0.75rem;
            }
            .message-bubble { 
                max-width: 90%; 
                padding: 0.75rem;
                border-radius: 1rem;
            }
            .message-bubble p { font-size: 0.8rem; }
            .message-bubble .timestamp { font-size: 0.65rem; }
            
            .quick-actions { 
                grid-template-columns: 1fr; 
                gap: 0.5rem;
            }
            .quick-actions button { 
                padding: 0.5rem; 
                font-size: 0.75rem;
                flex-direction: row;
                justify-content: flex-start;
                gap: 0.5rem;
            }
            .quick-actions i { 
                font-size: 0.9rem; 
                margin-bottom: 0;
            }
            
            .message-input { 
                font-size: 0.9rem; 
                padding: 0.75rem;
                border-radius: 1rem;
            }
            .send-button { 
                padding: 0.75rem;
                font-size: 0.9rem;
                border-radius: 1rem;
            }
            
            /* Typing Indicator */
            .typing-indicator { 
                padding: 0.5rem 0.75rem; 
                font-size: 0.8rem;
            }
            .typing-dot { 
                width: 6px; 
                height: 6px;
            }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            /* Tablet */
            .glass-card { margin: 0.75rem; }
            .chat-container { max-height: 70vh; }
            .message-bubble { max-width: 80%; }
            .quick-actions { grid-template-columns: repeat(3, 1fr); }
        }
        
        @media (min-width: 1025px) and (max-width: 1440px) {
            /* Desktop */
            .glass-card { margin: 1rem; }
            .chat-container { max-height: 75vh; }
        }
        
        @media (min-width: 1441px) {
            /* Large Desktop */
            .container { max-width: 1200px; }
            .glass-card { margin: 1.5rem; }
            .chat-container { max-height: 80vh; }
        }
        
        /* Landscape Mobile */
        @media (max-height: 600px) and (orientation: landscape) {
            .hero-bg { min-height: 100vh; }
            .glass-card { padding: 1rem; }
            .glass-card h1 { font-size: 1.5rem !important; }
            .chat-container { max-height: 45vh; }
            .message-bubble { max-width: 70%; }
        }
        
        /* High DPI Displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .glass, .glass-dark, .glass-card {
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
            }
        }
        
        /* Touch Devices */
        @media (hover: none) and (pointer: coarse) {
            .glass-button:hover {
                transform: none;
                background: rgba(255, 255, 255, 0.08);
            }
            .neon-border-hover:hover {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.5),
                           0 0 40px rgba(147, 51, 234, 0.3),
                           0 0 60px rgba(236, 72, 153, 0.2);
            }
        }
    </style>
</head>
<body class="scroll-smooth">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MessageBubble = ({ message, isUser, timestamp }) => (
            <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`}>
                <div className={`message-bubble p-4 rounded-2xl ${isUser 
                    ? 'bg-gradient-to-r from-blue-500 to-purple-500 text-white' 
                    : 'glass-card text-white'}`}>
                    <div className="flex items-start space-x-2">
                        {!isUser && <i className="fas fa-robot text-blue-400 mt-1"></i>}
                        <div>
                            <div className="font-semibold text-sm mb-1 opacity-70">
                                {isUser ? 'You' : 'AI Assistant'}
                            </div>
                            <div className="text-sm leading-relaxed">{message}</div>
                            <div className="text-xs opacity-50 mt-2">
                                {timestamp}
                            </div>
                        </div>
                        {isUser && <i className="fas fa-user text-purple-300 mt-1"></i>}
                    </div>
                </div>
            </div>
        );

        const QuickActions = ({ onQuickSend }) => (
            <div className="quick-actions grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                {[
                    { icon: 'fa-brain', text: 'What is AI?' },
                    { icon: 'fa-cog', text: 'How does it work?' },
                    { icon: 'fa-dollar-sign', text: 'Pricing?' },
                    { icon: 'fa-star', text: 'Features?' }
                ].map((action, i) => (
                    <button 
                        key={i} 
                        onClick={() => onQuickSend(action.text)} 
                        className="glass-button p-3 rounded-xl text-white text-sm hover:neon-border-hover transition-all"
                    >
                        <i className={`fas ${action.icon} mb-2 block md:mb-2 md:block`}></i>
                        {action.text}
                    </button>
                ))}
            </div>
        );

        const TypingIndicator = () => (
            <div className="flex justify-start mb-4">
                <div className="typing-indicator">
                    <div className="typing-dot"></div>
                    <div className="typing-dot"></div>
                    <div className="typing-dot"></div>
                </div>
            </div>
        );

        const App = () => {
            const [messages, setMessages] = useState([
                { 
                    text: 'Hello! I\'m your advanced AI assistant. I can help you with questions, tasks, and conversations. How can I assist you today?', 
                    isUser: false,
                    timestamp: new Date().toLocaleTimeString()
                }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('openai-key') || '');
            const [showApiKey, setShowApiKey] = useState(false);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);

            const scrollToBottom = useCallback(() => { 
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }, []);

            useEffect(() => { scrollToBottom(); }, [messages, scrollToBottom]);

            const sendMessage = async () => {
                if (!input.trim() || isTyping) return;
                
                const userMsg = input.trim();
                const timestamp = new Date().toLocaleTimeString();
                
                setMessages(prev => [...prev, { text: userMsg, isUser: true, timestamp }]);
                setInput(''); 
                setIsTyping(true);

                try {
                    if (apiKey) {
                        const res = await fetch('https://api.openai.com/v1/chat/completions', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json', 
                                'Authorization': `Bearer ${apiKey}` 
                            },
                            body: JSON.stringify({
                                model: 'gpt-3.5-turbo',
                                messages: [
                                    { role: 'system', content: 'You are a helpful AI assistant. Be concise and helpful.' },
                                    { role: 'user', content: userMsg }
                                ],
                                max_tokens: 300,
                                temperature: 0.7
                            })
                        });
                        
                        if (!res.ok) throw new Error('API request failed');
                        
                        const data = await res.json();
                        const aiReply = data.choices[0].message.content;
                        
                        setMessages(prev => [...prev, { 
                            text: aiReply, 
                            isUser: false, 
                            timestamp: new Date().toLocaleTimeString()
                        }]);
                    } else {
                        // Enhanced fallback responses
                        const responses = {
                            'ai': 'AI (Artificial Intelligence) is technology that enables machines to think and learn like humans. Add your OpenAI API key for real responses!',
                            'hello': 'Hello! How can I help you today? Add an OpenAI API key for advanced AI responses.',
                            'how': 'I work through advanced language processing. With an OpenAI API key, I can provide detailed, contextual responses.',
                            'price': 'The chatbox is free to use! You just need your own OpenAI API key for real AI responses.',
                            'features': 'Features: Real-time chat, glassmorphism UI, responsive design, OpenAI integration, and more!',
                            default: 'That\'s an interesting question! Add your OpenAI API key in the top bar to get detailed AI responses.'
                        };
                        
                        const lowerMsg = userMsg.toLowerCase();
                        let response = responses.default;
                        
                        for (const [key, value] of Object.entries(responses)) {
                            if (lowerMsg.includes(key)) {
                                response = value;
                                break;
                            }
                        }
                        
                        setMessages(prev => [...prev, { 
                            text: response, 
                            isUser: false, 
                            timestamp: new Date().toLocaleTimeString()
                        }]);
                    }
                } catch (error) {
                    setMessages(prev => [...prev, { 
                        text: 'Connection error. Please check your API key or internet connection. Using fallback mode.', 
                        isUser: false, 
                        timestamp: new Date().toLocaleTimeString()
                    }]);
                }
                
                setIsTyping(false);
                inputRef.current?.focus();
            };

            const handleKey = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const saveKey = () => {
                localStorage.setItem('openai-key', apiKey);
                setMessages(prev => [...prev, { 
                    text: 'API key saved successfully! You now have access to real AI responses.', 
                    isUser: false, 
                    timestamp: new Date().toLocaleTimeString()
                }]);
            };

            const clearChat = () => {
                setMessages([{
                    text: 'Chat cleared! How can I help you?',
                    isUser: false,
                    timestamp: new Date().toLocaleTimeString()
                }]);
            };

            return (
                <div className="hero-bg min-h-screen flex flex-col">
                    {/* Enhanced Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass-dark p-4 border-b border-white/10">
                        <div className="container mx-auto nav-content flex justify-between items-center max-w-4xl">
                            <div className="flex items-center space-x-3 logo-container">
                                <div className="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center">
                                    <i className="fas fa-robot text-white text-xl"></i>
                                </div>
                                <div>
                                    <span className="text-xl font-bold text-white space-grotesk gradient-text logo-title">AI Chatbox</span>
                                    <div className="text-xs text-gray-400 logo-subtitle">Advanced Assistant</div>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-3">
                                <div className="flex items-center space-x-2 glass-card p-2 rounded-lg api-input-container">
                                    <input 
                                        value={apiKey} 
                                        onChange={(e) => setApiKey(e.target.value)} 
                                        placeholder="OpenAI API Key" 
                                        type={showApiKey ? 'text' : 'password'}
                                        className="bg-transparent text-white outline-none w-48 text-sm"
                                    />
                                    <button 
                                        onClick={() => setShowApiKey(!showApiKey)}
                                        className="text-gray-400 hover:text-white"
                                    >
                                        <i className={`fas fa-${showApiKey ? 'eye-slash' : 'eye'}`}></i>
                                    </button>
                                    <button onClick={saveKey} className="px-3 py-1 gradient-bg text-white rounded font-bold text-xs">
                                        Save
                                    </button>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <div className={`w-2 h-2 rounded-full ${apiKey ? 'bg-green-400' : 'bg-yellow-400'}`}></div>
                                    <span className="text-xs text-gray-400">
                                        {apiKey ? 'OpenAI Active' : 'Simulation Mode'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <div className="flex-1 pt-20 container mx-auto px-6 max-w-4xl flex flex-col justify-center">
                        {/* Enhanced Header */}
                        <div className="glass-card p-8 mb-8 text-center neon-border rounded-3xl">
                            <h1 className="text-4xl md:text-6xl font-bold text-white mb-4 space-grotesk">
                                <span className="gradient-text">AI Chatbox</span>
                            </h1>
                            <p className="text-xl text-gray-300 mb-6">Powered by advanced AI with beautiful glassmorphism design</p>
                            
                            <div className="flex items-center justify-center space-x-6 text-gray-400 status-container">
                                <div className="flex items-center">
                                    <div className={`w-3 h-3 rounded-full mr-2 ${isTyping ? 'bg-green-400 animate-pulse' : 'bg-gray-600'}`}></div>
                                    <span className="text-sm">{isTyping ? 'AI is typing...' : 'Ready to chat'}</span>
                                </div>
                                <button 
                                    onClick={clearChat}
                                    className="px-4 py-2 glass-button rounded-lg text-sm hover:text-white"
                                >
                                    <i className="fas fa-trash mr-2"></i>Clear Chat
                                </button>
                            </div>
                        </div>

                        {/* Enhanced Chat Container */}
                        <div className="glass-card chat-container rounded-3xl p-6 mb-6 flex-1 overflow-y-auto custom-scrollbar space-y-4">
                            {messages.map((msg, i) => (
                                <MessageBubble 
                                    key={i} 
                                    message={msg.text} 
                                    isUser={msg.isUser} 
                                    timestamp={msg.timestamp}
                                />
                            ))}
                            {isTyping && <TypingIndicator />}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Enhanced Input Section */}
                        <div className="space-y-4">
                            <QuickActions onQuickSend={setInput} />
                            <div className="flex gap-3 input-container">
                                <input 
                                    ref={inputRef}
                                    value={input} 
                                    onChange={(e) => setInput(e.target.value)} 
                                    onKeyPress={handleKey} 
                                    placeholder="Type your message..." 
                                    className="flex-1 px-6 py-4 glass-card message-input text-white rounded-2xl focus:ring-2 focus:ring-purple-400 text-lg placeholder-gray-400 outline-none"
                                />
                                <button 
                                    onClick={sendMessage} 
                                    disabled={isTyping || !input.trim()} 
                                    className="px-8 py-4 gradient-bg send-button text-white rounded-2xl font-semibold neon-border-hover disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                                >
                                    <i className="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Enhanced Floating Elements */}
                    <div className="floating-elements">
                        <div className="floating-element" style={{width: '60px', height: '60px', top: '10%', left: '10%', animationDelay: '0s'}}></div>
                        <div className="floating-element" style={{width: '40px', height: '40px', top: '20%', right: '10%', animationDelay: '5s'}}></div>
                        <div className="floating-element" style={{width: '30px', height: '30px', bottom: '20%', left: '20%', animationDelay: '10s'}}></div>
                        <div className="floating-element" style={{width: '50px', height: '50px', top: '50%', right: '20%', animationDelay: '15s'}}></div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
